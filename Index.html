<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텀블벅 후원 트래커</title>
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbx-HimWMc2nc7_wzniLTCUnYwXM0KOR5vnO1pttMYYk2IfBfEHU2IY3vY4tj1ip5eU/exec">
  <link rel="canonical" href="https://script.google.com/macros/s/AKfycbx-HimWMc2nc7_wzniLTCUnYwXM0KOR5vnO1pttMYYk2IfBfEHU2IY3vY4tj1ip5eU/exec">
  <script>
    window.location.replace("https://script.google.com/macros/s/AKfycbx-HimWMc2nc7_wzniLTCUnYwXM0KOR5vnO1pttMYYk2IfBfEHU2IY3vY4tj1ip5eU/exec");
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f4efe6;
      color: #1f1a14;
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 420px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }
    p {
      color: #5b5245;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #1f1a14;
      color: #fbf7ee;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
    }
    a:hover { background: #c2410c; }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid #d6cdbc;
      border-top-color: #c2410c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="loader"></div>
    <h1>텀블벅 후원 트래커로 이동 중...</h1>
    <p>자동으로 이동되지 않으면 아래 버튼을 눌러주세요.</p>
    <a href="https://script.google.com/macros/s/AKfycbx-HimWMc2nc7_wzniLTCUnYwXM0KOR5vnO1pttMYYk2IfBfEHU2IY3vY4tj1ip5eU/exec">앱 열기</a>
  </div>
</body>
</html>
